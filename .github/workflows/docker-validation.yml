name: Docker Compose Validation

on:
  push:
    branches:
      - main

jobs:
  validate-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Structure
        run: tree -a

      - name: Validate Monitoring Stack Compose File
        run: docker compose -f compose/monitoring-stack/compose.yml config
